name: Deploy Case B to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "projects/case-b-music-studio/**"
      - ".github/workflows/deploy-case-b-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time, but don't cancel in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/case-b-music-studio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/case-b-music-studio/package-lock.json

      - run: npm ci

      - run: npm run build

      # GitHub Pages serves static files only — without this, deep links like
      # /students refresh into a 404. Routing the 404 page through the same
      # SPA shell lets React Router pick up the URL on the client.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: projects/case-b-music-studio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
